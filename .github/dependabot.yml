version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "cron"
      cron: "14 3 8 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - User
    versioning-strategy: increase
    cooldown:
      default: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "cron"
      cron: "42 2 22 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - User
    cooldown:
      default: 7
